<form method="get" class="report-modal-filters">

    <input type="hidden" name="tab" value="{{ tab_value }}">

    <input type="hidden" name="fecha_desde" class="fecha-desde-input" value="{{ filtros.fecha_desde }}">
    <input type="hidden" name="fecha_hasta" class="fecha-hasta-input" value="{{ filtros.fecha_hasta }}">

    <div class="modal-filter-grid">

        <div class="modal-filter-item modal-filter-wide">
            <label>
                <i class="bi bi-calendar2-range"></i>
                Rango de fechas
            </label>

            <input
                type="text"
                class="form-control report-date-range"
                placeholder="Seleccionar periodo"
                autocomplete="off"
                value="{% if filtros.fecha_desde and filtros.fecha_hasta %}{{ filtros.fecha_desde }} a {{ filtros.fecha_hasta }}{% endif %}"
            >
        </div>

        <div class="modal-filter-item">
            <label>
                <i class="bi bi-buildings"></i>
                Empresa
            </label>

            <select name="empresa" class="form-select modal-empresa-filter">
                <option value="">Todas las empresas</option>
                {% for empresa in empresas %}
                    <option value="{{ empresa.id }}"
                        {% if filtros.empresa == empresa.id|stringformat:"s" %}selected{% endif %}>
                        {{ empresa.nombre }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="modal-filter-item">
            <label>
                <i class="bi bi-search"></i>
                Buscar NR
            </label>

            <input
                type="text"
                name="nr"
                class="form-control"
                placeholder="Ej: 5068773-24"
                value="{{ filtros.nr }}"
            >
        </div>

        <div class="modal-filter-item">
            <label>
                <i class="bi bi-folder2-open"></i>
                Carpeta
            </label>
            <div class="modal-filter-item">
                <label>
                    <i class="bi bi-box-seam"></i>
                    Material
                </label>

                <input
                    type="text"
                    name="material"
                    class="form-control"
                    placeholder="Ej: IFE"
                    value="{{ filtros.material }}"
                >
            </div>
            <select name="carpeta" class="form-select materiales-carpeta-filter">

                <option value="">Todas las carpetas</option>

                {% for carpeta in carpetas %}
                    <option
                        value="{{ carpeta.id }}"
                        data-empresa="{{ carpeta.empresa.id }}"
                        {% if filtros.carpeta == carpeta.id|stringformat:"s" %}selected{% endif %}
                    >
                        {{ carpeta.codigo_carpeta }}
                    </option>
                {% endfor %}

            </select>
        </div>

        <div class="modal-filter-item">
            <label>
                <i class="bi bi-speedometer2"></i>
                Nivel de respuesta
            </label>

            <select name="nivel_respuesta" class="form-select">

                <option value="">Todos los niveles</option>

                <option value="EXCELENTE"
                    {% if filtros.nivel_respuesta == "EXCELENTE" %}selected{% endif %}>
                    Excelente
                </option>

                <option value="OPTIMO"
                    {% if filtros.nivel_respuesta == "OPTIMO" %}selected{% endif %}>
                    Óptimo
                </option>

                <option value="ACEPTABLE"
                    {% if filtros.nivel_respuesta == "ACEPTABLE" %}selected{% endif %}>
                    Aceptable
                </option>

                <option value="CRITICO"
                    {% if filtros.nivel_respuesta == "CRITICO" %}selected{% endif %}>
                    Crítico
                </option>

            </select>
        </div>

    </div>

    <div class="modal-filter-actions">

        <button type="submit" class="btn btn-shadow">
            <i class="bi bi-funnel"></i>
            Generar reporte
        </button>

        <a href="{% url 'reportes' %}?tab={{ tab_value }}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-clockwise"></i>
            Limpiar
        </a>


    </div>

</form>
