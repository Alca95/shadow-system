<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Shadow - Iniciar sesión</title>

    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background:#f4f6f8;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:white;
            padding:40px;
            width:350px;
            border-radius:10px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#333;
        }

        input{
            width:100%;
            padding:10px;
            margin-bottom:15px;
            border-radius:6px;
            border:1px solid #ccc;
            font-size:14px;
        }

        button{
            width:100%;
            padding:10px;
            border:none;
            border-radius:6px;
            background:#2c3e50;
            color:white;
            font-size:15px;
            cursor:pointer;
        }

        button:hover{
            background:#1a252f;
        }

        .footer{
            margin-top:20px;
            text-align:center;
            font-size:12px;
            color:#888;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h1>Shadow</h1>

    <form method="post">
        {% csrf_token %}
        {% if error %}
            <div style="color:red; margin-bottom:15px; text-align:center;">
                {{ error }}
            </div>
        {% endif %}

        <input type="text" name="username" placeholder="Usuario" required>

        <input type="password" name="password" placeholder="Contraseña" required>

        <button type="submit">
            Ingresar
        </button>

    </form>

    <div class="footer">
        Sistema de Verificación de Planos
    </div>

</div>

</body>
</html>
