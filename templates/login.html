{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión | Shadow</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background:
                linear-gradient(rgba(3, 10, 28, 0.38), rgba(3, 10, 28, 0.38)),
                url("{% static 'img/fondo_shadow.png' %}") center center / cover no-repeat;
            color: #111827;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .login-shell {
            width: 100%;
            max-width: 1280px;
            min-height: calc(100vh - 48px);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            position: relative;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 28px;
            padding: 28px 30px 26px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.24);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.55);
        }

        .logo-wrap {
            text-align: center;
            margin-bottom: 4px;
        }

        .logo-wrap img {
            width: 160px;
            max-width: 100%;
            height: auto;
            display: inline-block;
        }

        .login-title {
            text-align: center;
            font-size: 19px;
            font-weight: 700;
            color: #0f172a;
            margin: 10px 0 22px;
            letter-spacing: -0.02em;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
        }

        .form-control {
            width: 100%;
            height: 52px;
            border: 1px solid #d5dce6;
            border-radius: 12px;
            background: #f8fafc;
            padding: 0 16px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            color: #0f172a;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        .form-control:focus {
            border-color: #5b6dff;
            box-shadow: 0 0 0 4px rgba(91, 109, 255, 0.12);
            background: #ffffff;
        }

        .password-input {
            padding-right: 48px;
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            right: 14px;
            transform: translateY(-50%);
            border: 0;
            background: transparent;
            color: #94a3b8;
            font-size: 20px;
            cursor: pointer;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-password:hover {
            color: #475569;
        }

        .forgot-link {
            display: inline-block;
            margin-top: 2px;
            color: #4f46e5;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .submit-btn {
            width: 100%;
            height: 52px;
            border: 0;
            border-radius: 14px;
            background: linear-gradient(135deg, #5b6dff 0%, #4056d8 100%);
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 18px;
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            box-shadow: 0 16px 30px rgba(64, 86, 216, 0.24);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.03);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .error-box {
            margin-bottom: 18px;
            padding: 12px 14px;
            border-radius: 12px;
            background: #fff1f2;
            border: 1px solid #fecdd3;
            color: #b42318;
            font-size: 14px;
            line-height: 1.5;
        }

        .ande-logo {
            position: absolute;
            left: 6px;
            bottom: 10px;
        }

        .ande-logo img {
            width: 68px;
            height: auto;
            display: block;
        }

        @media (max-width: 991.98px) {
            body {
                padding: 20px;
                align-items: stretch;
            }

            .login-shell {
                min-height: auto;
                justify-content: center;
                align-items: center;
            }

            .login-card {
                max-width: 100%;
                padding: 24px 22px 22px;
                border-radius: 22px;
            }

            .logo-wrap img {
                width: 145px;
            }

            .login-title {
                font-size: 18px;
                margin-top: 8px;
                margin-bottom: 20px;
            }

            .ande-logo {
                left: 0;
                bottom: -2px;
            }

            .ande-logo img {
                width: 58px;
            }
        }

        @media (max-width: 575.98px) {
            body {
                padding: 16px;
            }

            .login-card {
                padding: 22px 18px 20px;
                border-radius: 20px;
            }

            .form-control,
            .submit-btn {
                height: 50px;
            }

            .logo-wrap img {
                width: 132px;
            }
        }
    </style>
</head>
<body>
    <div class="login-shell">
        <div class="login-card">
            <div class="logo-wrap">
                <img src="{% static 'img/logo_shadow3.png' %}" alt="Logo Shadow">
            </div>

            <h1 class="login-title">Iniciar sesión</h1>

            {% if error %}
                <div class="error-box">
                    {{ error }}
                </div>
            {% endif %}

            <form method="post" novalidate>
                {% csrf_token %}

                <div class="form-group">
                    <label for="id_username" class="form-label">Correo electrónico</label>
                    <div class="input-wrap">
                        <input
                            type="text"
                            id="id_username"
                            name="username"
                            class="form-control"
                            placeholder="Ingresa tu correo electrónico"
                            required
                            autofocus
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="id_password" class="form-label">Contraseña</label>
                    <div class="input-wrap">
                        <input
                            type="password"
                            id="id_password"
                            name="password"
                            class="form-control password-input"
                            placeholder="Ingresa tu contraseña"
                            required
                        >
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar u ocultar contraseña">
                            <i class="bi bi-eye-slash"></i>
                        </button>
                    </div>
                </div>

                <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>

                <button type="submit" class="submit-btn">Iniciar sesión</button>
            </form>
        </div>

        <div class="ande-logo">
            <img src="{% static 'img/logo_ande.png' %}" alt="ANDE">
        </div>
    </div>

    <script>
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('id_password');

        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', function () {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                this.innerHTML = isPassword
                    ? '<i class="bi bi-eye"></i>'
                    : '<i class="bi bi-eye-slash"></i>';
            });
        }
    </script>
</body>
</html>
