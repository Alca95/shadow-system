{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar contraseña | Shadow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background:
                linear-gradient(rgba(3, 10, 28, 0.38), rgba(3, 10, 28, 0.38)),
                url("{% static 'img/fondo_shadow.png' %}") center center / cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .reset-card {
            width: 100%;
            max-width: 460px;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.24);
        }

        .logo-wrap {
            text-align: center;
            margin-bottom: 10px;
        }

        .logo-wrap img {
            width: 160px;
        }

        h1 {
            font-size: 21px;
            color: #0f172a;
            text-align: center;
            margin: 12px 0 10px;
        }

        p {
            color: #64748b;
            font-size: 14px;
            line-height: 1.6;
            text-align: center;
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        input[type="email"] {
            width: 100%;
            height: 52px;
            border: 1px solid #d5dce6;
            border-radius: 12px;
            background: #f8fafc;
            padding: 0 16px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            box-sizing: border-box;
        }

        input[type="email"]:focus {
            border-color: #5b6dff;
            box-shadow: 0 0 0 4px rgba(91, 109, 255, 0.12);
            background: #ffffff;
        }

        .submit-btn {
            width: 100%;
            height: 52px;
            border: 0;
            border-radius: 14px;
            background: linear-gradient(135deg, #5b6dff 0%, #4056d8 100%);
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #4f46e5;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="reset-card">
        <div class="logo-wrap">
            <img src="{% static 'img/logo_shadow3.png' %}" alt="Logo Shadow">
        </div>

        <h1>Recuperar contraseña</h1>

        <p>
            Ingresa el correo asociado a tu usuario. Si existe una cuenta activa,
            recibirás un enlace seguro para definir una nueva contraseña.
        </p>

        <form method="post">
            {% csrf_token %}

            <label for="id_email">Correo electrónico</label>
            {{ form.email }}

            <button type="submit" class="submit-btn">
                Enviar enlace de recuperación
            </button>
        </form>

        <a href="{% url 'login' %}" class="back-link">
            Volver al inicio de sesión
        </a>
    </div>
</body>
</html>
