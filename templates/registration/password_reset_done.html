{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Correo enviado | Shadow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background:
                linear-gradient(rgba(3, 10, 28, 0.38), rgba(3, 10, 28, 0.38)),
                url("{% static 'img/fondo_shadow.png' %}") center center / cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .done-card {
            width: 100%;
            max-width: 460px;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 28px;
            padding: 34px 30px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.24);
            text-align: center;
        }

        .logo-wrap img {
            width: 160px;
        }

        h1 {
            color: #0f172a;
            margin: 18px 0 12px;
            font-size: 22px;
        }

        p {
            color: #64748b;
            line-height: 1.7;
            font-size: 14px;
        }

        .status-icon {
            width: 72px;
            height: 72px;
            border-radius: 999px;
            margin: 0 auto 18px;
            background: rgba(16, 185, 129, 0.14);
            color: #059669;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
        }

        .back-link {
            display: inline-block;
            margin-top: 22px;
            color: #4f46e5;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }
    </style>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <div class="done-card">

        <div class="logo-wrap">
            <img src="{% static 'img/logo_shadow3.png' %}" alt="Logo Shadow">
        </div>

        <div class="status-icon">
            <i class="bi bi-envelope-check"></i>
        </div>

        <h1>Enlace enviado</h1>

        <p>
            Si existe una cuenta asociada al correo ingresado,
            recibirás un enlace seguro para restablecer tu contraseña.
        </p>

        <a href="{% url 'login' %}" class="back-link">
            Volver al inicio de sesión
        </a>

    </div>

</body>
</html>
