{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contraseña actualizada | Shadow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background:
                linear-gradient(rgba(3, 10, 28, 0.38), rgba(3, 10, 28, 0.38)),
                url("{% static 'img/fondo_shadow.png' %}") center center / cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .complete-card {
            width: 100%;
            max-width: 460px;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 28px;
            padding: 34px 30px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.24);
            text-align: center;
        }

        .logo-wrap img {
            width: 160px;
        }

        .status-icon {
            width: 74px;
            height: 74px;
            border-radius: 999px;
            margin: 20px auto 18px;
            background: rgba(16, 185, 129, 0.14);
            color: #059669;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
        }

        h1 {
            color: #0f172a;
            margin-bottom: 12px;
            font-size: 22px;
        }

        p {
            color: #64748b;
            line-height: 1.7;
            font-size: 14px;
        }

        .login-link {
            display: inline-block;
            margin-top: 24px;
            padding: 14px 22px;
            border-radius: 14px;
            background: linear-gradient(135deg, #5b6dff 0%, #4056d8 100%);
            color: white;
            text-decoration: none;
            font-weight: 700;
            box-shadow: 0 16px 30px rgba(64, 86, 216, 0.24);
        }

        .login-link:hover {
            opacity: 0.96;
        }
    </style>
</head>
<body>

<div class="complete-card">

    <div class="logo-wrap">
        <img src="{% static 'img/logo_shadow3.png' %}" alt="Logo Shadow">
    </div>

    <div class="status-icon">
        <i class="bi bi-check-circle"></i>
    </div>

    <h1>Contraseña actualizada</h1>

    <p>
        Tu contraseña fue actualizada correctamente.
        Ya puedes iniciar sesión nuevamente en el sistema.
    </p>

    <a href="{% url 'login' %}" class="login-link">
        Ir al inicio de sesión
    </a>

</div>

</body>
</html>
